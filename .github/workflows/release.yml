name: Release

on:
  push:
    tags: ['v*']
  # Manual: publish the container image for an already-released version without cutting a new tag
  # (e.g. to backfill the first image). Only the container job runs; PyPI publish is skipped.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build the container for (e.g. 0.8.0)"
        required: true

# PyPI Trusted Publishing (OIDC) needs id-token: write. contents: write cuts the Release;
# packages: write pushes the container image to GHCR.
permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    # Only on a tag push — a manual workflow_dispatch just (re)publishes the container.
    if: github.event_name == 'push'
    # Bind to the PyPI environment the Trusted Publisher is configured against (see below).
    environment:
      name: pypi
      url: https://pypi.org/p/loam-geo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      # The tag must match pyproject.toml's version so the artifact and tag never drift.
      - name: Verify version matches tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          ver=$(python3 -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$tag pyproject version=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match pyproject.toml version $ver"
            exit 1
          fi

      - name: Build sdist + wheel
        run: uv build

      # Smoke-test the built wheel in a clean env: it installs, `loam --version` prints the TAG
      # (guards against any version drift — __version__ is single-sourced from the package
      # metadata), and a core command runs.
      - name: Verify wheel installs and CLI runs
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          got=$(uv run --isolated --no-project --with dist/*.whl loam --version | awk '{print $NF}')
          echo "tag=$tag  loam --version=$got"
          if [ "$got" != "$tag" ]; then
            echo "::error::built wheel reports version $got, expected $tag"
            exit 1
          fi
          uv run --isolated --no-project --with dist/*.whl loam indices >/dev/null

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          generate_release_notes: true

  container:
    name: Publish arm64 container to GHCR
    # Native arm64 runner (free on public repos) — builds the aarch.science-based image with NO
    # emulation, matching how #11 was verified. On a tag push, wait for the release job (the image
    # pip-installs the just-published loam-geo); on manual dispatch it runs standalone.
    needs: release
    if: always() && (github.event_name == 'workflow_dispatch' || needs.release.result == 'success')
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      # The image installs loam-geo==<version> from PyPI, so wait until that version is resolvable
      # (PyPI's index lags the release publish by up to ~a minute).
      - name: Wait for loam-geo on PyPI
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.version }}"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/loam-geo/$v/json")
            [ "$code" = "200" ] && { echo "loam-geo $v is live"; exit 0; }
            echo "waiting for loam-geo $v on PyPI ($i)…"; sleep 10
          done
          echo "::error::loam-geo $v not on PyPI after ~5min"; exit 1

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (arm64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/arm64
          push: true
          build-args: LOAM_VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/scttfrdmn/loam:${{ steps.ver.outputs.version }}
            ghcr.io/scttfrdmn/loam:latest
