name: Release

on:
  push:
    tags: ['v*']

# PyPI Trusted Publishing (OIDC) needs id-token: write. contents: write lets us cut the Release.
permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    # Bind to the PyPI environment the Trusted Publisher is configured against (see below).
    environment:
      name: pypi
      url: https://pypi.org/p/loam-geo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      # The tag must match pyproject.toml's version so the artifact and tag never drift.
      - name: Verify version matches tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          ver=$(python3 -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$tag pyproject version=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match pyproject.toml version $ver"
            exit 1
          fi

      - name: Build sdist + wheel
        run: uv build

      # Smoke-test the built wheel in a clean env: it installs and `loam --version` prints the tag.
      - name: Verify wheel installs and CLI runs
        run: |
          set -euo pipefail
          uv run --isolated --no-project --with dist/*.whl loam --version
          uv run --isolated --no-project --with dist/*.whl loam indices >/dev/null

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*
          generate_release_notes: true
